name: Sinhala Karaoke Bot

on:
  workflow_dispatch:

  schedule:
    - cron: "0 */6 * * *"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install FFmpeg
      run: |
        sudo apt update
        sudo apt install ffmpeg -y

    - name: Install Python Packages
      run: |
        pip install -r requirements.txt

    - name: Run Karaoke Bot
      run: |
        python song_bot.py

    - name: Upload Video
      uses: actions/upload-artifact@v4
      with:
        name: karaoke-video
        path: output/karaoke_song.mp4
